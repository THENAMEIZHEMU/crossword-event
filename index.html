<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AIvolve Crossword Challenge</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:#1e293b;
padding:40px;
border-radius:12px;
color:white;
width:900px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
text-align:center;
}

#timer{
font-size:22px;
color:#facc15;
text-align:center;
margin-bottom:20px;
}

.question{
margin-bottom:18px;
}

.boxes input{
width:35px;
height:35px;
margin:3px;
text-align:center;
font-size:18px;
border:2px solid #38bdf8;
background:#0f172a;
color:white;
}

button{
margin-top:20px;
padding:10px 25px;
background:#22c55e;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- PASSWORD -->

<div id="loginScreen" class="container">

<h2>Enter Password</h2>

<input type="password" id="passwordInput">

<br><br>

<button onclick="checkPassword()">Enter</button>

<p id="error"></p>

</div>

<!-- MAIN -->

<div id="mainContent" style="display:none;">

<div class="container">

<h1>AIvolve Crossword Challenge</h1>

<div id="timer">10:00</div>

<input id="team" placeholder="Team Name">

<br><br>

<div id="questions"></div>

<button onclick="submitPuzzle()">Submit</button>

</div>

</div>

<script>

const PASSWORD="aivolve";
let time=600;
let timer;

/* QUESTIONS */

const questions=[

{q:"Google search engine",len:6},
{q:"Language used for web pages",len:4},
{q:"Device used to move cursor",len:5},
{q:"Popular video platform",len:7},
{q:"AI chatbot by OpenAI",len:7},

{q:"Cloud computing platform by Amazon",len:3},
{q:"Programming language named after snake",len:6},
{q:"Microsoft operating system",len:7},
{q:"Technology behind cryptocurrencies",len:10},
{q:"Language used to style websites",len:3},
{q:"Version control system",len:3},
{q:"Google mobile OS",len:7},
{q:"Key value data structure",len:7},
{q:"Markup language for web",len:4},
{q:"Platform hosting Git repositories",len:6}

];

/* CREATE QUESTIONS */

const container=document.getElementById("questions");

questions.forEach((item,index)=>{

let div=document.createElement("div");
div.className="question";

let p=document.createElement("p");
p.innerText=(index+1)+". "+item.q;

div.appendChild(p);

let box=document.createElement("div");
box.className="boxes";

for(let i=0;i<item.len;i++){

let input=document.createElement("input");
input.maxLength=1;

box.appendChild(input);

}

div.appendChild(box);
container.appendChild(div);

});

/* PASSWORD */

function checkPassword(){

let entered=document.getElementById("passwordInput").value;

if(entered===PASSWORD){

document.getElementById("loginScreen").style.display="none";
document.getElementById("mainContent").style.display="block";

timer=setInterval(updateTimer,1000);

}else{

document.getElementById("error").innerText="Wrong Password";

}

}

/* TIMER */

function updateTimer(){

let m=Math.floor(time/60);
let s=time%60;

document.getElementById("timer").innerText=
m+":"+(s<10?"0":"")+s;

time--;

if(time<0){

clearInterval(timer);
submitPuzzle();

}

}

/* SUBMIT */

function submitPuzzle(){

let team=document.getElementById("team").value;

let responses=[];

document.querySelectorAll(".boxes input").forEach(i=>{
responses.push(i.value.toUpperCase());
});

fetch("https://script.google.com/macros/s/AKfycbyhj02318Z-ZQKYM43_gTzKhSOwIhwMSVQ90WHG4ISDEMszaLqg7oYsgb4XbtwoG78w/exec",{

method:"POST",

body:JSON.stringify({
team:team,
time:600-time,
responses:responses
})

})

.then(r=>r.text())
.then(score=>{

alert("Score: "+score);

location.reload();

});

}

/* ANTI CHEAT */

document.addEventListener("visibilitychange",()=>{

if(document.hidden){
location.reload();
}

});

document.addEventListener("contextmenu",e=>e.preventDefault());

document.addEventListener("keydown",function(e){

if(e.key==="F5") e.preventDefault();
if(e.ctrlKey && e.key==="r") e.preventDefault();

});

</script>

</body>
</html>
